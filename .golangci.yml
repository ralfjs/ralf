version: "2"

linters:
  default: standard
  enable:
    # Formatting
    - gofumpt

    # Bugs & correctness
    - gocritic
    - errcheck
    - errorlint
    - bodyclose
    - noctx
    - gosec

    # Performance
    - prealloc
    - unconvert

    # Maintainability
    - unparam
    - misspell
    - revive

linters-settings:
  gofumpt:
    extra-rules: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
      - name: unused-parameter
  gosec:
    excludes:
      - G104

formatters:
  enable:
    - gofumpt
