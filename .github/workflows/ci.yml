name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=mod

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Build librure
        run: ./scripts/build-librure.sh
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Build librure
        run: ./scripts/build-librure.sh
      - name: Run tests with coverage
        run: make coverage
      - name: Check overall coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=70
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Overall coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: Check diff coverage (PR only)
        if: github.event_name == 'pull_request'
        run: |
          # Get new/modified Go files in this PR
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.go' | grep -v '_test.go' || true)
          if [ -z "$CHANGED" ]; then
            echo "No non-test Go files changed — skipping diff coverage"
            exit 0
          fi

          # Extract per-function coverage for changed files, compute average
          TOTAL_STMTS=0
          COVERED_STMTS=0
          while IFS= read -r file; do
            # go tool cover -func outputs: file:line: funcName  coverage%
            # Filter to changed files, sum statements
            MOD_PATH="github.com/Hideart/ralf/${file}"
            while IFS=$'\t' read -r loc func pct; do
              pct_num=$(echo "$pct" | tr -d '%')
              # Each function line represents covered statements; approximate
              # by counting functions and weighting by coverage
              TOTAL_STMTS=$((TOTAL_STMTS + 1))
              if [ "$(echo "$pct_num > 0" | bc -l)" -eq 1 ]; then
                COVERED_STMTS=$((COVERED_STMTS + 1))
              fi
            done < <(go tool cover -func=coverage.out | grep "^${MOD_PATH}:" || true)
          done <<< "$CHANGED"

          if [ "$TOTAL_STMTS" -eq 0 ]; then
            echo "No coverable functions in changed files — skipping"
            exit 0
          fi

          DIFF_COV=$(echo "scale=1; $COVERED_STMTS * 100 / $TOTAL_STMTS" | bc)
          echo "New code coverage: ${DIFF_COV}% ($COVERED_STMTS/$TOTAL_STMTS functions covered)"
          THRESHOLD=70
          if [ "$(echo "$DIFF_COV < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::New code coverage ${DIFF_COV}% is below ${THRESHOLD}% threshold"
            exit 1
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: |
          go install mvdan.cc/gofumpt@latest
          gofumpt -d . | (! grep .)
      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: dtolnay/rust-toolchain@stable
      - name: Build librure
        run: ./scripts/build-librure.sh
      - name: Build
        run: make build
