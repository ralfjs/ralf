name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Run tests with coverage
        run: |
          CGO_ENABLED=1 go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Check overall coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=70
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Overall coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
      - name: Check new code coverage (PR only)
        if: github.event_name == 'pull_request'
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
      - name: Diff coverage
        if: github.event_name == 'pull_request'
        id: diff_coverage
        uses: PanagiotisPtr/cov-diff@v1
        with:
          path: .
          coverprofile: coverage.out
          diff: diff.txt
          module: github.com/Hideart/bepro
      - name: Fail if new code coverage below 70%
        if: github.event_name == 'pull_request'
        run: |
          DIFF_COV="${{ steps.diff_coverage.outputs.coverage }}"
          echo "New code coverage: ${DIFF_COV}%"
          if (( $(echo "$DIFF_COV < 70" | bc -l) )); then
            echo "::error::New code coverage ${DIFF_COV}% is below 70% threshold"
            exit 1
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Check formatting
        run: |
          go install mvdan.cc/gofumpt@latest
          gofumpt -d . | (! grep .)
      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: CGO_ENABLED=1 go build -o bepro ./cmd/bepro
